name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate SEO and static pages
        run: |
          python3 scripts/enrich-blog-posts.py
          python3 scripts/fetch-post-content.py || true
          python3 scripts/sync-seo.py
          python3 scripts/generate-site-meta.py
          python3 scripts/generate-post-pages.py
          python3 scripts/generate-sitemap.py
          python3 scripts/audit-seo.py

      - name: Prepare static artifact
        run: |
          rm -rf .antigravitycli .git .github scripts/__pycache__

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
